name: Claude Continuous Improvement

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude-code-action:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.issue.user.login == 'claude[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          timeout_minutes: "60"

          model: sonnet
          allowed_bots: "claude[bot]"
          allowed_tools: "Agent,Read,Write,Edit,MultiEdit,Glob,Grep,Bash(npm run build:*),Bash(npx tsc:*),Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(gh pr:*),Bash(gh issue:*)"

          custom_instructions: |
            Always read CLAUDE.md first and follow the project conventions.

            ## Issue-Driven Development (Planner -> Generator -> Evaluator Harness)

            When an Issue is created (event_name == 'issues'), follow this loop.
            Use the specialized agents in `.claude/agents/`.

            ### Step 1: Branch Setup (IMPORTANT)
            **Never create per-issue branches.** Always use the shared branch `claude/continuous-improvement`.
            All commits from all Issues must stack on this single branch.
            ```
            git fetch origin
            git checkout claude/continuous-improvement 2>/dev/null && git pull origin claude/continuous-improvement || git checkout -b claude/continuous-improvement
            ```

            ### Step 2: Planner (first time only)
            Invoke `dev-planner-agent` via the Agent tool.
            Pass the Issue title and body. Receive an implementation plan in JSON.

            ### Step 3: Generator -> Evaluator Loop
            For each file in the plan's `implementation_order`:

            1. Invoke `dev-generator-agent` to create/modify one file
            2. Invoke `dev-evaluator-agent` to verify the result
            3. If Evaluator returns `fail`, retry Generator with the feedback
            4. After **3 retries** still failing, note the issue and move to the next file

            ### Step 4: Build Verification
            After all files are done, run a build check. Fix any errors.

            ### Step 5: Commit and PR Update (IMPORTANT)
            **Always push to `claude/continuous-improvement`. Never use a different branch.**
            1. `git add -A` -> `git commit -m "feat: <summary> #<issue-number>"` -> `git push origin claude/continuous-improvement`
            2. Check if a PR exists: `gh pr list --head claude/continuous-improvement --state open`
               - If no PR: `gh pr create --base main --head claude/continuous-improvement --title "Claude Continuous Improvement" --body "Continuous improvement PR"`
               - If PR exists: `gh pr comment <pr-number> --body "Added implementation for Issue #<number>"`
            3. **Do not auto-merge.** The owner will review and merge.

            ### Step 6: Create Next Improvement Issue (Infinite Loop)
            After updating the PR, investigate the codebase and find the next improvement.

            1. Run `git log --oneline -10` to check recent changes (avoid repeating the same improvements)
            2. Read the codebase and pick one valuable improvement (bug fix, UX improvement, or new feature)
            3. `gh issue create --title "Title" --body "Description"` (Issues created by claude[bot] are auto-triggered)
            4. **Always create the next Issue. Never skip.** The loop only stops when the owner merges the PR.

            Guidelines:
            - Keep each improvement to 5 files or fewer
            - Pick a different area than the current Issue (maintain diversity)

            ## @claude Mention Handling
            When @claude is mentioned in PR comments, respond flexibly.
