name: Claude PR Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  # Job 1: Issue -> Claude が実装 + PR作成 + マージ + 次のIssue作成まで一貫して行う
  implement:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.issue.user.login == 'claude[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Script: @claude が無ければ追記
      - name: Inject @claude if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          if ! echo "$ISSUE_BODY" | grep -q "@claude"; then
            gh issue edit "$ISSUE_NUMBER" --body "@claude
          $ISSUE_BODY"
          fi

      # Claude: 実装からIssue作成まで一貫して実行
      - name: Run Claude
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          timeout_minutes: "60"
          model: sonnet
          allowed_bots: "claude[bot]"
          allowed_tools: "Agent,Read,Write,Edit,MultiEdit,Glob,Grep,Bash(npm install:*),Bash(npm run build:*),Bash(npx tsc:*),Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(gh pr:*),Bash(gh issue:*),Bash(git log:*)"

          custom_instructions: |
            日本語で回答してください。
            CLAUDE.md を必ず読み、プロジェクトの規約に従ってください。

            Issueが作成された場合、以下の手順で実装してください。
            `.claude/agents/` にある専用サブエージェントを使います。

            Step 1: Planner（設計）
            `dev-planner-agent` を Agent ツールで呼び出す。
            Issueのタイトルと本文を渡し、実装計画をJSON形式で受け取る。

            Step 2: Generator → Evaluator ループ（実装と検証）
            Plannerの出力に含まれる各ファイルについて implementation_order 順に:
            1. `dev-generator-agent` を Agent ツールで呼び出し、1ファイルを作成/修正
            2. `dev-evaluator-agent` を Agent ツールで呼び出し、実装結果を検証
            3. Evaluator が fail → フィードバックを添えて再度 Generator（最大3回）

            Step 3: ビルド検証
            npm install && npm run build でビルドチェック。エラーがあれば修正。

            Step 4: 変更をコミットしてプッシュする。

            Step 5: PRを作成してマージし、次のIssueを作成する。
            変更がある場合のみ以下を実行する（変更がなければStep 5はスキップ）:
            1. `gh pr create --base main --title "feat: <Issue タイトル>" --body "Closes #<Issue番号>"` でPRを作成
            2. `gh pr merge <PR番号> --squash --delete-branch` でマージ
            3. マージ確認後、`git log --oneline -10` で直近コミットを確認
            4. `gh issue create --title "継続的改善: 次の機能改善" --body "@claude\n\n直近のコミット（重複を避けること）:\n<git logの出力>\n\n上記を踏まえ、まだ実施していない改善を1つ選んで実装してください。変更は5ファイル以内にしてください。"` で次のIssueを作成

  # Job 2: PRコメントで @claude → Claude修正 → 再ビルド → マージ
  fix:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          timeout_minutes: "30"
          model: sonnet
          allowed_bots: "claude[bot]"
          allowed_tools: "Agent,Read,Write,Edit,MultiEdit,Glob,Grep,Bash(npm install:*),Bash(npm run build:*),Bash(npx tsc:*),Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(gh pr:*),Bash(gh issue:*)"

          custom_instructions: |
            日本語で回答してください。
            CLAUDE.md を必ず読み、プロジェクトの規約に従ってください。
            指摘された問題を修正してください。
            npm install && npm run build でビルドが通ることを確認してください。
            修正したらコミットしてプッシュしてください。

      # Script: 再ビルド検証 → マージ
      - name: Re-verify and merge
        if: github.event.issue.pull_request || github.event.pull_request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.issue.number }}" ]; then
            PR_NUM="${{ github.event.issue.number }}"
          else
            PR_NUM="${{ github.event.pull_request.number }}"
          fi

          BRANCH=$(gh pr view "$PR_NUM" --json headRefName --jq '.headRefName')
          if [ -z "$BRANCH" ]; then exit 0; fi

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin
          git checkout "$BRANCH" 2>/dev/null || exit 0
          git pull origin "$BRANCH" || true

          npm install --ignore-scripts

          # 3回失敗したらPRを閉じる
          FAIL_COUNT=$(gh pr view "$PR_NUM" --comments --json comments --jq '[.comments[].body | select(contains("Build") and contains("failed"))] | length')
          if [ "$FAIL_COUNT" -ge 3 ]; then
            gh pr comment "$PR_NUM" --body "Build failed 3 times. Closing PR."
            gh pr close "$PR_NUM"
            exit 0
          fi

          if ! npm run build 2>&1 | tee /tmp/build-output.txt; then
            BUILD_ERROR=$(tail -30 /tmp/build-output.txt)
            gh pr comment "$PR_NUM" --body "@claude Build still failing. Fix these errors:

          \`\`\`
          ${BUILD_ERROR}
          \`\`\`"
            exit 0
          fi

          gh pr comment "$PR_NUM" --body "Build passed. Auto-merging."
          gh pr merge "$PR_NUM" --squash --delete-branch
