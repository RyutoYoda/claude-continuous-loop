name: Claude Continuous Improvement

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  # Job 1: Issue -> branch + PR -> Claude implements -> build check -> merge
  implement:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.issue.user.login == 'claude[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Script: create branch + inject @claude + open PR
      - name: Create branch and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          if ! echo "$ISSUE_BODY" | grep -q "@claude"; then
            gh issue edit "$ISSUE_NUMBER" --body "@claude
          $ISSUE_BODY"
          fi

          BRANCH="claude/issue-${ISSUE_NUMBER}"
          git config user.email "claude[bot]@users.noreply.github.com"
          git config user.name "claude[bot]"
          git checkout -b "$BRANCH"
          git commit --allow-empty -m "Start work on #${ISSUE_NUMBER}"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "feat: ${ISSUE_TITLE}" \
            --body "Closes #${ISSUE_NUMBER}"

      # Claude: plan, implement, verify, commit, create next issue
      - name: Run Claude
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          timeout_minutes: "60"
          model: sonnet
          allowed_bots: "claude[bot]"
          allowed_tools: "Agent,Read,Write,Edit,MultiEdit,Glob,Grep,Bash(npm install:*),Bash(npm run build:*),Bash(npx tsc:*),Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(gh pr:*),Bash(gh issue:*)"

          custom_instructions: |
            Read CLAUDE.md first and follow project conventions.
            The branch and PR have already been created.
            Use the sub-agents in `.claude/agents/`.

            Step 1: Planner
            Invoke `dev-planner-agent` via Agent tool.
            Pass the Issue title and body. Receive an implementation plan in JSON.

            Step 2: Generator / Evaluator loop
            For each file in the plan's implementation_order:
            1. Invoke `dev-generator-agent` to create/modify one file
            2. Invoke `dev-evaluator-agent` to verify
            3. On fail, retry with feedback (max 3 times)

            Step 3: Build check
            Run the project build command. Fix errors.

            Step 4: Commit and push.

            Step 5: Create the next improvement Issue.
            - Run `git log --oneline -10` to avoid repeating recent work
            - Pick a different area. Keep to 5 files or fewer
            - Put `@claude` at the start of the body
            - Always create the next Issue. Never skip.

      # Script: build check -> merge (or ask Claude to fix on failure)
      - name: Verify and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH="claude/issue-${ISSUE_NUMBER}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin
          git checkout "$BRANCH" 2>/dev/null || exit 0
          git pull origin "$BRANCH" || true

          npm install --ignore-scripts
          PR_NUM=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -z "$PR_NUM" ]; then exit 0; fi

          if ! npm run build 2>&1 | tee /tmp/build-output.txt; then
            BUILD_ERROR=$(tail -30 /tmp/build-output.txt)
            gh pr comment "$PR_NUM" --body "@claude Build failed. Fix the following errors:

          \`\`\`
          ${BUILD_ERROR}
          \`\`\`"
            exit 0
          fi

          gh pr comment "$PR_NUM" --body "Build passed. Auto-merging."
          gh pr merge "$PR_NUM" --squash --delete-branch

  # Job 2: PR comment @claude -> Claude fixes -> re-build -> merge
  fix:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          timeout_minutes: "30"
          model: sonnet
          allowed_bots: "claude[bot]"
          allowed_tools: "Agent,Read,Write,Edit,MultiEdit,Glob,Grep,Bash(npm install:*),Bash(npm run build:*),Bash(npx tsc:*),Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(gh pr:*),Bash(gh issue:*)"

          custom_instructions: |
            Read CLAUDE.md first and follow project conventions.
            Fix the reported problem.
            Run the project build command and confirm it passes.
            Commit and push.

      # Script: re-build -> merge (or ask Claude to fix again, max 3 times)
      - name: Re-verify and merge
        if: github.event.issue.pull_request || github.event.pull_request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.issue.number }}" ]; then
            PR_NUM="${{ github.event.issue.number }}"
          else
            PR_NUM="${{ github.event.pull_request.number }}"
          fi

          BRANCH=$(gh pr view "$PR_NUM" --json headRefName --jq '.headRefName')
          if [ -z "$BRANCH" ]; then exit 0; fi

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin
          git checkout "$BRANCH" 2>/dev/null || exit 0
          git pull origin "$BRANCH" || true

          npm install --ignore-scripts

          # Max 3 build failures -> close PR
          FAIL_COUNT=$(gh pr view "$PR_NUM" --comments --json comments --jq '[.comments[].body | select(contains("Build") and contains("failed"))] | length')
          if [ "$FAIL_COUNT" -ge 3 ]; then
            gh pr comment "$PR_NUM" --body "Build failed 3 times. Closing PR."
            gh pr close "$PR_NUM"
            exit 0
          fi

          if ! npm run build 2>&1 | tee /tmp/build-output.txt; then
            BUILD_ERROR=$(tail -30 /tmp/build-output.txt)
            gh pr comment "$PR_NUM" --body "@claude Build still failing. Fix these errors:

          \`\`\`
          ${BUILD_ERROR}
          \`\`\`"
            exit 0
          fi

          gh pr comment "$PR_NUM" --body "Build passed. Auto-merging."
          gh pr merge "$PR_NUM" --squash --delete-branch
